ai_usage_summary: |
  Used Claude for architectural design, code review, and test-driven development.
  GitHub Copilot for autocomplete during implementation.
  No candidate data was fed to any external LLM after dataset release.

methodology_summary: |
  Multi-query candidate discovery pipeline with hybrid search (FAISS + BM25),
  cross-encoder reranking (ms-marco-MiniLM-L-6-v2), and 7-dimensional
  weighted scoring (semantic similarity, keyword match, skill match,
  cross-encoder relevance, experience, location, education).
  Uses 17 strategic queries across different roles and tech stacks to
  ensure comprehensive coverage. Results are merged with deduplication,
  keeping the best score per candidate. Cross-encoder provides fine-grained
  relevance assessment that naturally filters out honeypot profiles.
  Full pipeline runs in under 8 seconds on CPU with offline mode.

