  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false          # HF_HUB_OFFLINE=1, models cached locally
  pre_computation_required: true
  pre_computation_time_minutes: 15           # scripts/build_indexes.py (FAISS + BM25 + offset index)

# ── AI tools declaration ──────────────────────────────────────────────────
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) for iterative development, architecture discussion,
  code review, and code generation throughout the project lifecycle. No
  candidate data was fed to any LLM — all search, scoring, and ranking
  logic is deterministic Python. Claude was used only for writing and
  reviewing the codebase itself.

# ── Approach summary ─────────────────────────────────────────────────────
methodology_summary: |
  Multi-query hybrid search engine with 10-dimension weighted scoring and
  Plackett-Luce listwise ranking. Pipeline: 17 strategic job queries (SWE,
  data/ML, cloud/DevOps, mobile, QA, security, product) are each expanded
  with skill alias variants → FAISS vector search + BM25 keyword search fused
  via Reciprocal Rank Fusion → cross-encoder reranking (ms-marco-MiniLM-L-6-v2)
  → 10-dimension multi-signal scoring (semantic, skill match, behavioral,
  career trajectory, experience, proficiency) → best-score merge across queries
  → fill remaining slots from full index with base scoring (capped at 0.55) →
  sort by score → export 100-row CSV with heterogenous reasoning strings.
  Key differentiators: cross-encoder deep semantic understanding (not just
  TF-IDF), Redrob behavioral signals (response rate, saved count, verification),
  career trajectory analysis (job hopping penalties, title progression),
  skill proficiency depth scoring, and honeypot detection (time-travel,
  skill density anomalies). Runs in ~8 seconds on CPU, fully offline.

# ── Declarations ─────────────────────────────────────────────────────────
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
