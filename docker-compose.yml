version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: india_runs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/india_runs
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
      - "7860:7860"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

volumes:
  pgdata:
